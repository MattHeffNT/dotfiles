- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.tmux.conf: tmux.conf
    ~/.vim: vim
    ~/.vimrc: vimrc
    ~/.config/alacritty/alacritty.yml: alacritty.yml 
    ~/.config/lvim/config.lua: config.lua

- create:
    - ~/downloads
    - ~/.vim/undo-history
    - ~/.config/alacritty

- shell:
  - [git submodule update --init --recursive, Installing submodules]
